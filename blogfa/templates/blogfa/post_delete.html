{% extends '_base.html' %}

{% block page_title %}
    post delete
{% endblock page_title %}


{% block content %}
    <div class="container mt-4">
        <div class="card shadow my-3 p-5">


            <h1>
                Are you sure ?
            </h1>
            <p>
                Are you sure you want to delete {{ post.title }} ?
            </p>
            <form action="" method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger" value="yes, Delete">Submit</button>
            </form>
        </div>
    </div>

{% endblock content %}
